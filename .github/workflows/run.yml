name: Competitor AI Agent

on:
  schedule:
    - cron: '0 8 * * 1' 
  workflow_dispatch: 

# This new section tells GitHub to use the updated Node.js 24 engine
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  investigate:
    runs-on: ubuntu-latest
    steps:
      - name: Grab my files
        uses: actions/checkout@v4

      - name: Install Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install tool kits
        run: pip install requests google-generativeai

      - name: Run the Agent
        env:
          SCRAPINGBEE_API_KEY: ${{ secrets.SCRAPINGBEE_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python main.py

      - name: Save the final report
        uses: actions/upload-artifact@v4
        with:
          name: Intelligence-Report
          path: report.md
